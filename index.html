<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Миколаївелектротранс</title>
  <style>
    :root {
      --teal-bg: #27cfc8;
      --screen: #1d1f23;
      --screen-2: #101114;
      --card: #1f2126;
      --card-2: #1a1c20;
      --line: rgba(255,255,255,0.14);
      --text: #f6f7f9;
      --muted: #aeb4bf;
      --muted-2: #8a919c;
      --pill: #19c7be;
      --bar-top: #1bcfc6;
      --bar-bottom: #ff8c90;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--teal-bg);
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 610px;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 2px, transparent 2px),
        linear-gradient(180deg, var(--teal-bg) 0 128px, #0e0f12 128px 100%);
      background-size: 52px 52px, 52px 52px, 100% 100%;
      position: relative;
      overflow-x: hidden;
    }

    .pattern::before,
    .pattern::after {
      content: "✕";
      position: absolute;
      color: rgba(255,255,255,0.13);
      font-size: 24px;
      top: 18px;
      left: 98px;
      text-shadow:
        88px 8px rgba(255,255,255,0.11),
        174px -2px rgba(255,255,255,0.1),
        262px 10px rgba(255,255,255,0.11),
        350px 2px rgba(255,255,255,0.1),
        12px 44px rgba(255,255,255,0.09),
        102px 56px rgba(255,255,255,0.11),
        190px 48px rgba(255,255,255,0.08),
        276px 54px rgba(255,255,255,0.09),
        360px 44px rgba(255,255,255,0.1),
        54px 92px rgba(255,255,255,0.09),
        144px 102px rgba(255,255,255,0.11),
        232px 94px rgba(255,255,255,0.08),
        318px 104px rgba(255,255,255,0.09);
      pointer-events: none;
    }

    .topbar {
      height: 88px;
      padding: 22px 22px 0;
      display: flex;
      align-items: center;
      color: #fff;
      position: relative;
      z-index: 2;
    }

    .back {
      font-size: 36px;
      line-height: 1;
      font-weight: 300;
      user-select: none;
    }

    .sheet {
      margin: 16px 18px 0;
      background: linear-gradient(180deg, #24262b 0%, #121317 100%);
      border-radius: 28px 28px 0 0;
      min-height: calc(100vh - 104px);
      box-shadow: 0 -6px 18px rgba(0,0,0,0.12);
      position: relative;
      z-index: 2;
      overflow: hidden;
    }

    .header {
      padding: 0 22px 12px;
      text-align: center;
      position: relative;
    }

    .logo {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #fff;
      margin: -45px auto 12px;
      border: 2px solid rgba(0,0,0,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo svg {
      width: 66px;
      height: 44px;
    }

    .title {
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.1px;
      color: #eef1f4;
      margin-bottom: 12px;
    }

    .travel-row {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 18px;
    }

    .travel-row::before,
    .travel-row::after {
      content: "";
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.14);
      max-width: 180px;
    }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      border: none;
      color: #ecffff;
      background: linear-gradient(180deg, #20cbc2 0%, #15b8b0 100%);
      border-radius: 999px;
      font-size: 15px;
      padding: 10px 26px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.12);
    }

    .datetime {
      color: #c3c8d1;
      font-size: 17px;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    .amount {
      font-size: 72px;
      font-weight: 300;
      letter-spacing: -2px;
      line-height: 1;
      color: #fff;
      margin-bottom: 18px;
    }

    .amount .dec {
      font-size: 0.72em;
      letter-spacing: -1px;
    }

    .content {
      padding: 0 22px 28px;
    }

    .card {
      background: linear-gradient(180deg, #1f2126 0%, #1b1d21 100%);
      border-radius: 18px;
      padding: 18px 18px;
      margin-bottom: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.015);
    }

    .placeholder {
      color: #8e95a0;
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 17px;
      padding-bottom: 17px;
    }

    .iconbox {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1bc9c0;
      color: #fff;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
    }

    .iconbox svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .small-title {
      color: #e5e8ed;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .small-value {
      color: #ffffff;
      font-size: 18px;
      line-height: 1.15;
    }

    .receipt {
      padding: 0;
      overflow: hidden;
      background: linear-gradient(180deg, #1e2024 0%, #1b1d21 100%);
    }

    .receipt-top {
      height: 10px;
      background: radial-gradient(circle at 10px -4px, transparent 11px, #17191d 12px);
      background-size: 20px 10px;
    }

    .receipt-inner {
      padding: 18px 18px 16px;
    }

    .receipt-head {
      margin-bottom: 22px;
    }

    .receipt-item-name {
      font-size: 18px;
      color: #fff;
      margin-bottom: 2px;
    }

    .receipt-sub {
      color: #b0b6c0;
      font-size: 15px;
    }

    .receipt-price {
      color: #fff;
      font-size: 18px;
      align-self: flex-end;
      padding-bottom: 2px;
    }

    .show-more {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      color: #f6f8fb;
      font-size: 17px;
      font-weight: 600;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 6px 0 16px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.14);
    }

    .summary-pill {
      color: #afb6c1;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 14px;
      white-space: nowrap;
      background: rgba(255,255,255,0.01);
    }

    .chart-card {
      padding: 18px 14px 14px;
    }

    .chart-wrap {
      height: 240px;
      position: relative;
    }

    .plot {
      position: absolute;
      inset: 0 0 28px 0;
    }

    .baseline {
      position: absolute;
      left: 48px;
      right: 10px;
      bottom: 0;
      height: 2px;
      background: rgba(255,255,255,0.18);
    }

    .grid {
      position: absolute;
      left: 48px;
      right: 10px;
      border-top: 1px dashed rgba(255,255,255,0.13);
    }

    .ylabel {
      position: absolute;
      left: 10px;
      transform: translateY(-50%);
      color: #e1e5ea;
      font-size: 15px;
    }

    .bars {
      position: absolute;
      left: 58px;
      right: 16px;
      bottom: 2px;
      top: 0;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
    }

    .bar-group {
      width: 42px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-direction: column;
      height: 100%;
      position: relative;
    }

    .bar {
      width: 24px;
      min-height: 3px;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(180deg, var(--bar-top) 0%, var(--bar-bottom) 100%);
    }

    .month-row {
      position: absolute;
      left: 58px;
      right: 16px;
      bottom: 0;
      display: flex;
      justify-content: space-between;
      color: #b7bec8;
      font-size: 15px;
    }

    .month {
      width: 42px;
      text-align: center;
    }

    .month.current {
      color: #ffffff;
    }

    @media (max-width: 480px) {
      .sheet {
        margin-left: 14px;
        margin-right: 14px;
      }

      .amount {
        font-size: 64px;
      }

      .travel-row::before,
      .travel-row::after {
        max-width: 110px;
      }
    }
  </style>
</head>
<body>
  <div class="app pattern">
    <div class="topbar">
      <div class="back">←</div>
    </div>

    <main class="sheet">
      <section class="header">
        <div class="logo" aria-label="Логотип">
          <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="5" y="25" width="28" height="30" rx="3" fill="#1d76c7"/>
            <rect x="36" y="23" width="18" height="34" rx="2" fill="#f4c21c"/>
            <rect x="56" y="20" width="32" height="36" rx="2" fill="#f4c21c"/>
            <rect x="90" y="28" width="24" height="24" rx="3" fill="#3f86d9"/>
            <circle cx="96" cy="56" r="5" fill="#555"/>
            <circle cx="110" cy="56" r="5" fill="#555"/>
            <rect x="8" y="16" width="24" height="8" rx="2" fill="#2b8de0"/>
            <text x="13" y="46" font-size="18" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">М</text>
            <text x="40" y="47" font-size="23" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">E</text>
            <text x="59" y="47" font-size="23" font-family="Arial, sans-serif" font-weight="700" fill="#ffffff">T</text>
          </svg>
        </div>

        <div class="title">Миколаївелектротранс</div>

        <div class="travel-row">
          <button class="pill-btn">Подорожі <span style="font-size:13px;">✎</span></button>
        </div>

        <div class="datetime" id="currentDateTime">18 березня 2026, 15:37</div>
        <div class="amount">-8<span class="dec">.00 ₴</span></div>
      </section>

      <section class="content">
        <div class="card placeholder">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="4" y="3" width="11" height="14" rx="2" stroke="#8e95a0" stroke-width="1.8"/>
            <rect x="9" y="7" width="11" height="14" rx="2" stroke="#8e95a0" stroke-width="1.8"/>
          </svg>
          <span>Опис та #теги</span>
        </div>

        <div class="card">
          <div class="row">
            <div class="left">
              <div class="iconbox" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5h11A2.5 2.5 0 0 1 20 7.5v9A2.5 2.5 0 0 1 17.5 19h-11A2.5 2.5 0 0 1 4 16.5v-9Zm3 1.5a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2H7Z"/>
                </svg>
              </div>
              <div>
                <div class="small-title">Залишок</div>
                <div class="small-value">7.93 ₴</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card receipt">
          <div class="receipt-top"></div>
          <div class="receipt-inner">
            <div class="row receipt-head">
              <div class="left">
                <div class="iconbox" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M7 4h10v15l-2-1.5-2 1.5-2-1.5-2 1.5-2-1.5V6a2 2 0 0 1 2-2Zm2 4a1 1 0 0 0 0 2h6a1 1 0 1 0 0-2H9Zm0 4a1 1 0 0 0 0 2h6a1 1 0 1 0 0-2H9Z"/>
                  </svg>
                </div>
                <div class="small-title">Чек</div>
              </div>
            </div>

            <div class="row" style="align-items:flex-end;">
              <div>
                <div class="receipt-item-name">Тролейбус</div>
                <div class="receipt-sub">x 1</div>
              </div>
              <div class="receipt-price">8.00 ₴</div>
            </div>

            <div class="show-more"><span style="font-size:22px; line-height:0.8;">⌄</span><span>Показати повністю</span></div>
          </div>
        </div>

        <div class="divider">
          <div class="summary-pill">Витратили 72 ₴ за півроку</div>
        </div>

        <div class="card chart-card">
          <div class="chart-wrap">
            <div class="plot">
              <div class="grid" style="top: 4px;"></div>
              <div class="grid" style="top: 78px;"></div>
              <div class="baseline"></div>

              <div class="ylabel" style="top: 4px; transform: none;">40 ₴</div>
              <div class="ylabel" style="top: 78px;">20 ₴</div>
              <div class="ylabel" style="bottom: -10px; transform: none;">0 ₴</div>

              <div class="bars" id="bars"></div>
            </div>
            <div class="month-row" id="monthLabels"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const shortMonths = ['січ', 'лют', 'бер', 'квіт', 'трав', 'чер', 'лип', 'сер', 'вер', 'жов', 'лис', 'гру'];
    const longMonths = ['січня', 'лютого', 'березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня'];

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateDateTime() {
      const now = new Date();
      const text = `${now.getDate()} ${longMonths[now.getMonth()]} ${now.getFullYear()}, ${pad(now.getHours())}:${pad(now.getMinutes())}`;
      document.getElementById('currentDateTime').textContent = text;
    }

    function buildChart() {
      const now = new Date();
      const currentMonth = now.getMonth();
      const bars = document.getElementById('bars');
      const labels = document.getElementById('monthLabels');

      const monthValues = {
        9: 1,
        10: 1,
        11: 12,
        0: 1,
        1: 38,
        2: 12,
        3: 0,
        4: 0,
        5: 0,
        6: 0,
        7: 0,
        8: 0
      };

      const visible = [];
      for (let i = 5; i >= 0; i--) {
        visible.push((currentMonth - i + 12) % 12);
      }

      bars.innerHTML = '';
      labels.innerHTML = '';

      visible.forEach((monthIndex) => {
        const value = monthValues[monthIndex] || 0;
        const barGroup = document.createElement('div');
        barGroup.className = 'bar-group';

        const bar = document.createElement('div');
        bar.className = 'bar';
        const h = value <= 0 ? 2 : Math.max(4, value * 4.2);
        bar.style.height = `${h}px`;

        barGroup.appendChild(bar);
        bars.appendChild(barGroup);

        const label = document.createElement('div');
        label.className = 'month' + (monthIndex === currentMonth ? ' current' : '');
        label.textContent = shortMonths[monthIndex];
        labels.appendChild(label);
      });
    }

    updateDateTime();
    buildChart();
    setInterval(updateDateTime, 1000);

    function scheduleChartRefresh() {
      const now = new Date();
      const nextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1, 0, 0, 2);
      setTimeout(() => {
        buildChart();
        scheduleChartRefresh();
      }, nextMonth - now);
    }

    scheduleChartRefresh();
  </script>
</body>
</html>
